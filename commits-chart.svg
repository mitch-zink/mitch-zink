    </stop>
    <stop offset="100%" stop-color="#3FCF8E">
      <animate attributeName="stop-color" values="#3FCF8E;#29B5E8;#7B42BC;#3FCF8E" dur="30s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
</defs>

