  <linearGradient id="topgrad" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0%" stop-color="#29B5E8">
      <animate attributeName="stop-color" values="#29B5E8;#7B42BC;#3FCF8E;#29B5E8" dur="30s" repeatCount="indefinite"/>
