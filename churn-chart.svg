<svg xmlns="http://www.w3.org/2000/svg" width="480" height="234" viewBox="0 0 480 234" font-family="Inter,system-ui,sans-serif">

<defs>
  <linearGradient id="cgrad" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0%" stop-color="#29B5E8"/><stop offset="100%" stop-color="#1A5F8E"/>
  </linearGradient>
  <linearGradient id="agrad" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0%" stop-color="#3FCF8E"/><stop offset="100%" stop-color="#1F6B49"/>
