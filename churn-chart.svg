  </linearGradient>
  <linearGradient id="topgrad" x1="0" x2="1" y1="0" y2="0">
    <stop offset="0%" stop-color="#29B5E8">
      <animate attributeName="stop-color" values="#29B5E8;#7B42BC;#3FCF8E;#29B5E8" dur="30s" repeatCount="indefinite"/>
    </stop>
    <stop offset="50%" stop-color="#7B42BC">
      <animate attributeName="stop-color" values="#7B42BC;#3FCF8E;#29B5E8;#7B42BC" dur="30s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#3FCF8E">
      <animate attributeName="stop-color" values="#3FCF8E;#29B5E8;#7B42BC;#3FCF8E" dur="30s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
</defs>

